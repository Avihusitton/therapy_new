name: Deploy Stage

on:
  push:
    branches:
      - stage
    paths-ignore:
      - "monitoring/**"
  workflow_dispatch:

jobs:
  deploy-stage:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify react-dom/server.edge
        run: node -e "console.log(require.resolve('react-dom/server.edge'))"

      - name: Next.js Build
        run: npm run build

      - name: Build OpenNext bundle
        run: npx @opennextjs/cloudflare build

      - name: Deploy to Cloudflare stage env
        id: deploy
        run: |
          # Capture wrangler deploy output to extract the deployment URL
          DEPLOY_OUTPUT=$(npx @opennextjs/cloudflare deploy --env stage 2>&1) || {
            echo "$DEPLOY_OUTPUT"
            exit 1
          }
          echo "$DEPLOY_OUTPUT"

          # wrangler outputs the URL in various formats. Try common patterns:
          #   "Published ... https://therapy-new-stage.<account>.workers.dev"
          #   "Current Version URL: https://..."
          #   Look for any https://*.workers.dev URL
          DEPLOYMENT_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[a-zA-Z0-9._-]+\.workers\.dev' | tail -1)

          # Fallback: use known stage worker URL from ARCHITECTURE.md
          if [ -z "$DEPLOYMENT_URL" ]; then
            DEPLOYMENT_URL="https://therapy-new-stage.avihu-sitton.workers.dev"
            echo "⚠️  Could not parse URL from wrangler output — using known fallback"
          fi

          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deployment URL: $DEPLOYMENT_URL"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against deployed stage
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.DEPLOYMENT_URL }}
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
